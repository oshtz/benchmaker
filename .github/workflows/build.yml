name: Build Windows

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri:build -- --bundles none

      - name: Cache Enigma Virtual Box installer
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}\enigmavb_setup.exe
          key: enigma-virtual-box-installer-v1

      - name: Install Enigma Virtual Box
        shell: pwsh
        env:
          EVB_INSTALLER_SHA256: ${{ vars.EVB_INSTALLER_SHA256 }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:EVB_INSTALLER_SHA256)) {
            throw "EVB_INSTALLER_SHA256 repository variable is required before downloading the Enigma Virtual Box installer."
          }
          $expectedHash = $env:EVB_INSTALLER_SHA256.Trim().ToLowerInvariant()
          if ($expectedHash -notmatch '^[a-f0-9]{64}$') {
            throw "EVB_INSTALLER_SHA256 must be a 64-character SHA-256 hex digest."
          }

          # Download EVB installer with multiple fallback sources
          $evbUrls = @(
            "https://www.enigmaprotector.com/assets/files/enigmavb.exe",
            "https://enigmaprotector.com/assets/files/enigmavb.exe",
            "https://web.archive.org/web/2024/https://enigmaprotector.com/assets/files/enigmavb.exe"
          )
          $evbInstaller = Join-Path $env:RUNNER_TEMP "enigmavb_setup.exe"
          $downloaded = (Test-Path $evbInstaller) -and (Get-Item $evbInstaller).Length -gt 1MB
          if ($downloaded) {
            $cachedHash = (Get-FileHash -Algorithm SHA256 $evbInstaller).Hash.ToLowerInvariant()
            if ($cachedHash -eq $expectedHash) {
              Write-Host "Using cached EVB installer."
            } else {
              Write-Warning "Cached EVB installer hash mismatch; deleting cache entry and downloading again."
              Remove-Item -LiteralPath $evbInstaller -Force
              $downloaded = $false
            }
          }
          foreach ($evbUrl in $evbUrls) {
            if ($downloaded) { break }
            Write-Host "Trying: $evbUrl"
            for ($attempt = 1; $attempt -le 3; $attempt++) {
              try {
                # Use Invoke-WebRequest with browser-like headers
                $headers = @{
                  "User-Agent" = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
                  "Accept" = "text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,*/*;q=0.8"
                }
                Invoke-WebRequest -Uri $evbUrl -OutFile $evbInstaller -UseBasicParsing -Headers $headers -MaximumRedirection 5

                if ((Test-Path $evbInstaller) -and (Get-Item $evbInstaller).Length -gt 1MB) {
                  $downloaded = $true
                  Write-Host "Downloaded successfully from $evbUrl"
                  break
                }
              } catch {
                Write-Host "Attempt $attempt failed: $_"
              }
              Start-Sleep -Seconds 2
            }
            if ($downloaded) { break }
          }

          if (-not $downloaded) {
            throw "Failed to download EVB installer. The enigmaprotector.com site may be blocking CI downloads. Consider caching the installer in a GitHub release."
          }

          $actualHash = (Get-FileHash -Algorithm SHA256 $evbInstaller).Hash.ToLowerInvariant()
          if ($actualHash -ne $expectedHash) {
            throw "EVB installer SHA-256 mismatch. Expected $expectedHash but got $actualHash."
          }

          # Install silently
          $process = Start-Process -FilePath $evbInstaller -ArgumentList "/VERYSILENT","/NORESTART" -Wait -PassThru
          if ($process.ExitCode -ne 0) {
            throw "EVB installer failed with exit code $($process.ExitCode)"
          }

          # Verify
          if (Test-Path "C:\Program Files (x86)\Enigma Virtual Box\enigmavbconsole.exe") {
            Write-Host "EVB installed successfully"
          } else {
            throw "EVB installation failed"
          }

      - name: Create portable exe
        shell: pwsh
        run: |
          # Install @insco/enigma-virtualbox CLI globally
          npm install -g @insco/enigma-virtualbox
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to install @insco/enigma-virtualbox"
          }

          $inputExe = Resolve-Path "src-tauri\target\release\Benchmaker.exe"
          $outputExe = Join-Path $PWD "src-tauri\target\release\Benchmaker-Portable.exe"
          $webviewDll = Get-ChildItem -Path "src-tauri\target" -Filter "WebView2Loader.dll" -Recurse | Select-Object -First 1
          if (-not $webviewDll) {
            throw "WebView2Loader.dll not found under src-tauri\\target"
          }
          $webviewDllPath = $webviewDll.FullName

          # Use enigmavirtualbox to generate a compatible EVB project file
          $evbStaging = Join-Path $PWD "evb-staging"
          New-Item -ItemType Directory -Force -Path $evbStaging | Out-Null
          Copy-Item -Path $webviewDllPath -Destination $evbStaging -Force
          $evbProject = Join-Path $PWD "Benchmaker.evb"
          enigmavirtualbox generate $evbStaging --input $inputExe --output $outputExe --project-name $evbProject
          if ($LASTEXITCODE -ne 0) {
            throw "enigmavirtualbox generate failed"
          }
          $evbConsole = "C:\Program Files (x86)\Enigma Virtual Box\enigmavbconsole.exe"
          if (-not (Test-Path $evbConsole)) {
            throw "enigmavbconsole.exe not found at $evbConsole"
          }
          & $evbConsole $evbProject
          if ($LASTEXITCODE -ne 0) {
            throw "enigmavbconsole failed"
          }

          # Verify output
          if (Test-Path $outputExe) {
            $size = [math]::Round((Get-Item $outputExe).Length / 1MB, 2)
            Write-Host "Portable exe created: $size MB"
          } else {
            throw "Failed to create portable exe"
          }

      - name: Sign portable exe
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE) -or [string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_PASSWORD)) {
            $message = "Windows signing secrets are not configured; portable exe will remain unsigned."
            Write-Warning $message
            exit 0
          }

          $certPath = Join-Path $env:RUNNER_TEMP "windows-signing-cert.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE))
          $asset = Resolve-Path "src-tauri\target\release\Benchmaker-Portable.exe"
          & signtool sign /fd SHA256 /f $certPath /p $env:WINDOWS_CERTIFICATE_PASSWORD /tr http://timestamp.digicert.com /td SHA256 $asset
          if ($LASTEXITCODE -ne 0) {
            throw "signtool failed with exit code $LASTEXITCODE"
          }

      - name: Verify portable signature
        shell: pwsh
        run: |
          $asset = Resolve-Path "src-tauri\target\release\Benchmaker-Portable.exe"
          $signature = Get-AuthenticodeSignature $asset
          if ($signature.Status -ne "Valid") {
            $message = "Portable exe Authenticode status: $($signature.Status)"
            Write-Warning $message
            exit 0
          }
          Write-Host "Portable exe signature is valid: $($signature.SignerCertificate.Subject)"

      - name: Generate portable checksum
        shell: pwsh
        run: |
          $asset = "src-tauri\target\release\Benchmaker-Portable.exe"
          $hash = (Get-FileHash -Algorithm SHA256 $asset).Hash.ToLowerInvariant()
          "$hash  Benchmaker-Portable.exe" | Set-Content -NoNewline "$asset.sha256"

      - name: Upload portable exe
        uses: actions/upload-artifact@v6
        with:
          name: Benchmaker-Portable
          path: |
            src-tauri/target/release/Benchmaker-Portable.exe
            src-tauri/target/release/Benchmaker-Portable.exe.sha256

      - name: Determine release tag
        id: release_tag
        if: github.ref == 'refs/heads/main'
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          if (-not $version) {
            throw "package.json version not found"
          }
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=v$version" >> $env:GITHUB_OUTPUT

      - name: Check for existing release
        id: release_check
        if: github.ref == 'refs/heads/main'
        uses: actions/github-script@v8
        with:
          script: |
            const tag = '${{ steps.release_tag.outputs.tag }}';
            try {
              await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag
              });
              core.setOutput('exists', 'true');
            } catch (error) {
              core.setOutput('exists', 'false');
            }

      - name: Create GitHub release
        if: github.ref == 'refs/heads/main' && steps.release_check.outputs.exists != 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            src-tauri/target/release/Benchmaker-Portable.exe
            src-tauri/target/release/Benchmaker-Portable.exe.sha256

  build-macos:
    needs: build-windows
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Import Apple certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ] || [ -z "$APPLE_CERTIFICATE_PASSWORD" ] || [ -z "$APPLE_SIGNING_IDENTITY" ]; then
            echo "Missing Apple signing secrets (APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD, APPLE_SIGNING_IDENTITY)."
            exit 1
          fi
          echo "$APPLE_CERTIFICATE" | base64 --decode > /tmp/apple_cert.p12
          KEYCHAIN_PASSWORD="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import /tmp/apple_cert.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -A
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security list-keychains -d user -s build.keychain
          security default-keychain -s build.keychain
          security find-identity -v -p codesigning build.keychain

      - name: Verify notarization credentials
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "$APPLE_ID" ] || [ -z "$APPLE_PASSWORD" ] || [ -z "$APPLE_TEAM_ID" ]; then
            echo "Missing notarization secrets (APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID)."
            exit 1
          fi
          xcrun notarytool store-credentials "notarytool-profile" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_PASSWORD"

      - name: Build Tauri app (dmg)
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          NODE_OPTIONS: --max-old-space-size=4096
          RUST_LOG: tauri_bundler=debug
          RUST_BACKTRACE: 1
        run: npm run tauri:build -- --bundles app,dmg

      - name: Determine release tag
        id: release_tag
        if: github.ref == 'refs/heads/main'
        run: |
          version=$(node -p "require('./package.json').version")
          if [ -z "$version" ]; then
            echo "package.json version not found"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Create app.zip for auto-update
        run: |
          cd src-tauri/target/release/bundle/macos
          # Use ditto to create zip (preserves code signature and attributes)
          ditto -c -k --keepParent "Benchmaker.app" "Benchmaker.app.zip"
          ls -la
          echo "Created Benchmaker.app.zip for auto-update"

      - name: Generate macOS checksums
        run: |
          for asset in src-tauri/target/release/bundle/dmg/*.dmg src-tauri/target/release/bundle/macos/Benchmaker.app.zip; do
            hash=$(shasum -a 256 "$asset" | awk '{print $1}')
            printf "%s  %s" "$hash" "$(basename "$asset")" > "$asset.sha256"
          done

      - name: Upload dmg
        uses: actions/upload-artifact@v6
        with:
          name: Benchmaker-macOS-dmg
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/dmg/*.dmg.sha256

      - name: Upload app.zip
        uses: actions/upload-artifact@v6
        with:
          name: Benchmaker-macOS-app-zip
          path: |
            src-tauri/target/release/bundle/macos/Benchmaker.app.zip
            src-tauri/target/release/bundle/macos/Benchmaker.app.zip.sha256

      - name: Upload dmg to GitHub release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          files: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/dmg/*.dmg.sha256

      - name: Upload app.zip to GitHub release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          files: |
            src-tauri/target/release/bundle/macos/Benchmaker.app.zip
            src-tauri/target/release/bundle/macos/Benchmaker.app.zip.sha256
